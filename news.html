<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — Minecraft Club of America</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="images/icon.ico">
</head>
<body>

<!-- nav + footer injected by nav.js -->

<div class="page-wrap">

  <div class="hero">
    <div class="hero-eyebrow">MCA Gazette</div>
    <h1>News &amp;<br><em>Announcements</em></h1>
    <p class="hero-sub">Official news, updates, and stories from across the Minecraft Club of America — written and published by MCA members.</p>
  </div>

  <div class="content">
    <div class="section">

      <div class="news-search-wrap">
        <div class="news-search-inner">
          <span class="news-search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input
            type="search"
            id="news-search"
            class="news-search"
            placeholder="Search articles, authors, categories…"
            autocomplete="off"
          >
        </div>
        <span class="news-search-count" id="news-search-count"></span>
      </div>

      <div id="news-loading" class="news-loading">Loading articles…</div>
      <div id="news-error"   class="news-error"   style="display:none;"></div>
      <div id="news-index"   class="news-index"   style="display:none;"></div>
      <div id="news-empty"   class="news-empty"   style="display:none;">No articles match your search.</div>
    </div>
  </div>

</div>

<script src="nav.js"></script>
<script src="news.js"></script>
</body>
</html>
